name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        uv sync --extra dev
    
    - name: Check documentation is current
      run: |
        uv run python -m docs_generator.generate
        if ! git diff --quiet; then
          echo ""
          echo "❌ Docs were stale. The following files were regenerated:"
          git diff --name-only
          echo ""
          echo "Run 'uv run python -m docs_generator.generate' locally and commit the result."
          exit 1
        fi
        echo "✅ All documentation is up to date."
    
    - name: Run tests
      run: |
        uv run pytest -v --cov=app --cov-report=term --cov-report=html
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: htmlcov/
    
    - name: Check coverage threshold
      run: |
        uv run pytest --cov=app --cov-fail-under=45
